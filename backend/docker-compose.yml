services:
  db:
    # pgvector image required for Knowledge Mesh (D10). Plain postgres will fail CREATE EXTENSION vector.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prodmate
      POSTGRES_PASSWORD: prodmate
      POSTGRES_DB: prodmate
    ports:
      - "5432:5432"
    volumes:
      - prodmate_pg:/var/lib/postgresql/data

volumes:
  prodmate_pg:
